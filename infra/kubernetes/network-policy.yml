apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vault-api-policy
  namespace: cyber-vault-dev
spec:
  podSelector:
    matchLabels:
      app: vault-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: cyber-vault-dev
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: ipfs-node
    ports:
    - protocol: TCP
      port: 5001
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ipfs-node-policy
  namespace: cyber-vault-dev
spec:
  podSelector:
    matchLabels:
      app: ipfs-node
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: cyber-vault-dev
    ports:
    - protocol: TCP
      port: 5001
    - protocol: TCP
      port: 4001
  egress:
  - to: []
    ports: []
