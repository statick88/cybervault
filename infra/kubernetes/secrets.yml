apiVersion: v1
kind: Secret
metadata:
  name: vault-secrets
  namespace: cyber-vault-dev
type: Opaque
stringData:
  # Claves de encriptación (generadas en tiempo de ejecución en producción)
  master-key: ${VAULT_MASTER_KEY}
  encryption-salt: ${VAULT_ENCRYPTION_SALT}
  # Credenciales de base de datos
  db-password: ${DB_PASSWORD}
  # JWT secrets
  jwt-secret: ${JWT_SECRET}
---
apiVersion: v1
kind: Secret
metadata:
  name: ipfs-secrets
  namespace: cyber-vault-dev
type: Opaque
stringData:
  # API key para IPFS (si se usa servicio externo)
  ipfs-api-key: ${IPFS_API_KEY}
  # Peer ID para identificación
  peer-id: ${IPFS_PEER_ID}
