apiVersion: v1
kind: Service
metadata:
  name: ipfs-node
  namespace: cyber-vault-dev
  labels:
    app: ipfs-node
spec:
  type: ClusterIP
  selector:
    app: ipfs-node
  ports:
  - name: swarm
    port: 4001
    targetPort: 4001
    protocol: TCP
  - name: api
    port: 5001
    targetPort: 5001
    protocol: TCP
  - name: gateway
    port: 8080
    targetPort: 8080
    protocol: TCP
